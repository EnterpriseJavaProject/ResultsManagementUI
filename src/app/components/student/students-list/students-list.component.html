
<h1>Students List</h1>
  <!-- <mat-card class="example-card"> -->
    <!-- <mat-card-title>Students List</mat-card-title> -->
    <br>
    <mat-form-field>
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
  </mat-form-field>

  <button mat-raised-button color="primary" class="button" (click)="openAddDialog()"><mat-icon>add</mat-icon> &nbsp;Student</button>
<div class="divtable">

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
          <ng-container matColumnDef="actions" >
            <th mat-header-cell *matHeaderCellDef style="text-align: center;">Actions</th>
            <td mat-cell *matCellDef="let element">
             <button mat-icon-button (click)="openInfoDialog(element)" color="info"><mat-icon matTooltip="More Info" >info</mat-icon></button>       &nbsp;&nbsp;
             <button mat-icon-button (click)="openCourseDialog(element)" color="ekf-green"><mat-icon matTooltip="Add To Course" >library_add_check</mat-icon></button>       &nbsp;&nbsp;
             <button mat-icon-button (click)="openDialog(element)" color="primary"><mat-icon matTooltip="Update Info">border_color</mat-icon></button>  &nbsp;&nbsp;
             <button mat-icon-button (click)="openConfirmDialog(element)" color="warn"> <mat-icon matTooltip="Delete Student" >delete</mat-icon></button> 


            </td>
       
        </ng-container>
  
    <!-- Position Column -->
    <ng-container matColumnDef="course">
      <th mat-header-cell *matHeaderCellDef> Course </th>
      <td mat-cell *matCellDef="let element"> {{element.course}} </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="full_name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.full_name}} </td>
    </ng-container>
  
    <!-- Weight Column -->
    <ng-container matColumnDef="student_id">
      <th mat-header-cell *matHeaderCellDef> Student ID </th>
      <td mat-cell *matCellDef="let element"> {{element.student_id}} </td>
    </ng-container>
  
    <!-- Symbol Column -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let element"> {{element.email}} </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
     <!-- Row shown when there is no matching data. -->
     <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">No data matching the filter "{{input.value}}"</td>
  </tr>
  </table>
</div>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[10,15,20 ]"></mat-paginator>
<!-- </mat-card> -->
