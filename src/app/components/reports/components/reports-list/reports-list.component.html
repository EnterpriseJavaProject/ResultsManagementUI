<!-- <mat-card class="example-card"> -->
    <h1>Generate Report</h1>

    <ng-container *ngFor="let dashItem of cardsData">
      <div class="dive">
        <app-dashboard-cards
        [messages]="dashItem.messages" 
         [headerIcon]="dashItem.headerIcon"
         [headerColor]="dashItem.headerColor"
         >
       </app-dashboard-cards>
      </div>
      
    </ng-container>

<mat-tab-group mat-align-tabs="center" class="tab" (selectedTabChange)="tabChanged($event)">
  <mat-tab *ngFor="let link of navLinks">
    <ng-template mat-tab-label>
      <i class="{{link.icon}}"></i> &nbsp;
      {{link.label}}
    </ng-template>
  </mat-tab>
</mat-tab-group>
<br>
<br>
<mat-form-field style="width: 95%;">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
</mat-form-field>


<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
          <!-- <ng-container matColumnDef="actions" >
            <th mat-header-cell *matHeaderCellDef style="text-align: center;">Actions</th>
            <td mat-cell *matCellDef="let element">
             <button mat-icon-button  color="info"><mat-icon matTooltip="More Info" >info</mat-icon></button>       &nbsp;&nbsp;
             <button mat-icon-button  color="ekf-green"><mat-icon matTooltip="Generate Report" >feed</mat-icon></button>       &nbsp;&nbsp;
            </td>
        </ng-container> -->

        <ng-container [matColumnDef]="column" *ngFor="let column of columns;index as i ">
          <th mat-header-cell *matHeaderCellDef > {{column}} </th>
          <td mat-cell *matCellDef="let element" > {{element[column]}}</td>
        </ng-container>
        <ng-container matColumnDef="modification">
          <th mat-header-cell *matHeaderCellDef >Action</th>
          <td mat-cell *matCellDef="let element" > 
            <button mat-icon-button  color="info" ><mat-icon matTooltip="More Info" >info</mat-icon></button>       &nbsp;&nbsp;
            <button mat-icon-button (click)="cons(element)"  color="info" ><mat-icon matTooltip="Generate Report" >description</mat-icon></button> 

          </td>
        
      </ng-container>
    
   
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
     <!-- Row shown when there is no matching data. -->
     <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">No data matching the filter "{{input.value}}"</td>
  </tr>
  <!-- <ng-container >

  </ng-container> -->

  </table>
  <mat-paginator [pageSize]="10" [pageSizeOptions]="[10,15,20 ]"></mat-paginator>
