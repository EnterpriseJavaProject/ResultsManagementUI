<h2>Enrolled Students</h2>
<div>
    <mat-form-field style="width: 80%">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
      </mat-form-field>&nbsp;&nbsp;&nbsp;&nbsp;
      <button mat-raised-button color="primary" class="button" (click)="onUpload()" ><mat-icon>backup</mat-icon> &nbsp;Upload</button>

</div>

<form [formGroup]="VOForm" autocomplete="off">
  <ng-container formArrayName="VORows">
    <table #table mat-table [dataSource]="dataSource" class="mat-elevation-z8" >

      <!-- Position Column -->
      <ng-container matColumnDef="student_id">
        <th mat-header-cell *matHeaderCellDef> Student ID </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroup]="element">
          <mat-form-field style="width: 100px;text-decoration: none;" appearance="standard" >
            <input matInput type="text" formControlName="student_id" [readonly]="true">
          </mat-form-field>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="full_name">
        <th mat-header-cell *matHeaderCellDef> Full Name </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroup]="element">

          <!-- <span [hidden]="VOForm.get('VORows').value[i].isEditable"> -->
          <mat-form-field style="width: 150px;"
            [appearance]="VOForm.get('VORows').value[i].isEditable? 'standard' : 'legacy'">
            <input matInput type="text" formControlName="full_name" [readonly]="VOForm.get('VORows').value[i].isEditable">
          </mat-form-field>
          <!-- </span> -->

        </td>
      </ng-container>

 

      <!-- Symbol Column -->
      <!-- <ng-container matColumnDef="symbol">
        <th mat-header-cell *matHeaderCellDef> Symbol </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroup]="element">
           <span [hidden]="VOForm.get('VORows').value[i].isEditable"> -->
          <!-- <mat-form-field style="width: 70px;"
            [appearance]="VOForm.get('VORows').value[i].isEditable? 'none' : 'legacy'">
            <input matInput type="text" formControlName="symbol" [readonly]="VOForm.get('VORows').value[i].isEditable">
          </mat-form-field>
           </span> -->
        <!-- </td>
      </ng-container>  -->

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let element; let i = index" [formGroup]="element">
          <button mat-icon-button class="material-icons app-toolbar-menu save-button"
                                  matTooltip="Save Changes" (click)="SaveVO(VOForm,i)"
                                  *ngIf="!VOForm.get('VORows').value[i].isEditable" color="primary">
                                  <mat-icon>check_circle</mat-icon>
                              </button>

          <button mat-icon-button class="material-icons app-toolbar-menu cancel-button"
                                  matTooltip="Cancel Changes" color="warn"
                                  (click)="CancelSVO(VOForm,i)"
                                  *ngIf="!VOForm.get('VORows').value[i].isEditable">
                                  <mat-icon>cancel</mat-icon>
                              </button>

          <button mat-icon-button class="material-icons app-toolbar-menu save-button"
                                  *ngIf="VOForm.get('VORows').value[i].isEditable"
                                  matTooltip="Edit" color="primary" (click)="EditSVO(VOForm,i)">
                                  <mat-icon>edit</mat-icon>
                              </button>

          <button mat-icon-button class="material-icons app-toolbar-menu delete-button"
                                  *ngIf="VOForm.get('VORows').value[i].isEditable"
                                  matTooltip="Delete" color="warn">
                                  <mat-icon>delete</mat-icon>
                              </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>
  </ng-container>
</form>
<mat-card *ngIf="isLoading" style="display: flex; justify-content: center; align-items: center">
<mat-progress-spinner 
  color="primary" 
  mode="indeterminate">
</mat-progress-spinner>
</mat-card>

      <mat-paginator [pageSize]="10" [pageSizeOptions]="[10,15,20 ]"></mat-paginator>
