<div>
    <mat-toolbar>
     
        <button mat-icon-button class="example-icon" *ngIf="sidenav.mode === 'over'" (click)="sidenav.toggle()">
          <mat-icon  *ngIf="!sidenav.opened">
              menu
          </mat-icon>
          <mat-icon *ngIf="sidenav.opened">
              close
          </mat-icon>
      </button>
      <mat-icon class="example-icon">history_edu</mat-icon>&nbsp;<nav></nav>
    
        <span>Student Results Management System</span>
        <span class="example-spacer"></span>
        <div class="right-top">
          <button mat-icon-button class="example-icon favorite-icon" matTooltip="Reset Password" (click)="openReset()" >
            <mat-icon>lock</mat-icon>
          </button>
          <button mat-icon-button class="example-icon" matTooltip="Logout" >
            <mat-icon>logout</mat-icon>
          </button>
        </div>
    
      </mat-toolbar>
    
      <mat-sidenav-container>
        <mat-sidenav #sidenav="matSidenav" >
          <img class="avatar mat-elevation-z8" src="assets/user.svg" />
    
          <h4 class="name">John Smith</h4>
          <p class="designation">Software Engineer</p>
          <mat-divider></mat-divider>
    
            <button mat-button class="menu-button" [routerLink]="['/dashboard']" routerLinkActive="router-link-active" >
                <mat-icon>home</mat-icon>
                <span>Dashboard</span>
            </button>
            <button mat-button class="menu-button" [routerLink]="['/students-list']" routerLinkActive="router-link-active" >
                <mat-icon>local_library</mat-icon>
                <span>Students</span>
            </button>
            <button mat-button class="menu-button" [routerLink]="['/staff-list']" routerLinkActive="router-link-active" >
                <mat-icon>groups</mat-icon>
                <span>Staff</span>
            </button>
            <button mat-button class="menu-button" [routerLink]="['/courses-list']" routerLinkActive="router-link-active" >
                <mat-icon>class</mat-icon>
                <span>Courses</span>
            </button>
            <button mat-button class="menu-button" [routerLink]="['/module-list']" routerLinkActive="router-link-active" >
                <mat-icon>view_module</mat-icon>
                <span>Course Modules</span>
            </button>
            <button mat-button class="menu-button" [routerLink]="['/reports']" routerLinkActive="router-link-active" >
                <mat-icon>summarize</mat-icon>
                <span>Reports</span>
            </button>
        </mat-sidenav>
        <mat-sidenav-content>
            <div class="content ">
              <!-- <h1>content</h1> -->
              <router-outlet></router-outlet>
            </div>
        </mat-sidenav-content>
    </mat-sidenav-container>
    </div>
