<mat-card class="example-card">
    <mat-card-title class="title">Course Info</mat-card-title>
    <br>
    <div >
    <img src="assets/course.svg" alt="staff" style="height: 250px;"/>
    <div class="details">
        <p><span>Course Name </span>: Camila</p>
        <p><span>Course Code </span>: Camila</p>
        <p><span>Lecturer </span>: Camila</p>
        <p><span>Total Modules </span>: Camila</p>
        <p><span>Total Students </span>: Camila</p>

    </div>  
    </div>
    <br>
    <div class="staff-table">
        <h3>Course Modules</h3>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="course_name">
            <th mat-header-cell *matHeaderCellDef> Module Name</th>
            <td mat-cell *matCellDef="let element"> {{element.course_name}} </td>
          </ng-container>

          <ng-container matColumnDef="course_code">
            <th mat-header-cell *matHeaderCellDef> Module Code </th>
            <td mat-cell *matCellDef="let element"> {{element.course_code}} </td>
          </ng-container>

          <ng-container matColumnDef="start_date">
            <th mat-header-cell *matHeaderCellDef> Start_date </th>
            <td mat-cell *matCellDef="let element"> {{element.start_date}} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        
           <!-- Row shown when there is no matching data. -->
           <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="6">No data matching the filter "{{input.value}}"</td>
        </tr>


    </table>
    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10 ]"></mat-paginator>

    </div>
   
</mat-card>
