<mat-toolbar mat-dialog-title *ngIf="addOnlyForm" style="background-color:peru;">  
    Add Course-Module   
</mat-toolbar> 

<mat-toolbar mat-dialog-title *ngIf="!addOnlyForm" style="background-color:peru;">  
  Update Course-Module  
</mat-toolbar>

<mat-dialog-content>
<ng-container>
       
    <form [formGroup]="moduleForm" >
      <div >
 
        <mat-form-field class="email-full-width">
          <mat-label>Module Name</mat-label>
          <input type="module_name" id="module_name"  name="module_name" matInput placeholder="Ex. DBC" formControlName="module_name" required>
     <mat-error>
        {{errors.module_insert}}
      </mat-error>
        </mat-form-field>
      </div>
   
      <div  *ngIf="addOnlyForm" >
    <mat-form-field  class="email-full-width">
      <mat-label>Select Course </mat-label>
      <mat-select formControlName="course_name" [(value)]="course_name" (selectionChange)="onChange($event.value)">
        <mat-option *ngFor="let course of courseList; let i = index;" [value]="i">
          {{course.course_name}}
        </mat-option>
      </mat-select>
      <mat-error>
        {{errors.course_select}}
      </mat-error>
    </mat-form-field>
  </div>
  <div  *ngIf="!addOnlyForm" >
    <mat-form-field style="width: 100%;" [disabled]='true'>
      <mat-label> Course Name</mat-label>
      <input id="course_name"  [disabled]='true'  name="course_name" matInput  formControlName="update_name" >
    </mat-form-field>
    <!-- <mat-form-field  class="email-full-width">
      <mat-label>Select Coursee </mat-label>
      <mat-select formControlName="update_name"  [(value)]="course_name">
        <mat-option *ngFor="let course of updateList" [value]="course.course_name">
          {{course.course_name}}
        </mat-option>
      </mat-select> -->
      <!-- <mat-error>
        {{errors.course_name}}
      </mat-error> -->
    <!-- </mat-form-field> -->
</div>
  <div>
    <mat-form-field  class="email-full-width">
      <mat-label>Select Instructor </mat-label>
      <mat-select formControlName="staff_name">
        <mat-option *ngFor="let lecturer of courseInstructors" [value]="lecturer.name">
          {{lecturer.name}}
        </mat-option>
      </mat-select>
      <!-- <mat-error>
        {{errors.course_name}}
      </mat-error> -->
    </mat-form-field>
</div>
<div   *ngIf="!addOnlyForm">
  <mat-form-field  class="email-full-width">
    <mat-label>Status  </mat-label>
  <mat-select formControlName="status" required>
    <mat-option *ngFor="let status of statusList" [value]="status.value">
      {{status.name}}
    </mat-option>
  </mat-select>
  <!-- <mat-error>
    {{errors.course_select}}
  </mat-error> -->
</mat-form-field>
</div>

    </form>
    <div>

    </div>
  

  </ng-container>
</mat-dialog-content>
<div class="dialog-actions">
  <mat-dialog-actions >  
    <button  mat-raised-button 
    color="warn"  (click)="close()">Close</button>  &nbsp;&nbsp;
    <button  *ngIf="addOnlyForm" mat-raised-button
    color="primary" (click)="onAdd()" [disabled]="moduleForm.invalid">Add</button>  
    <button  *ngIf="!addOnlyForm"  mat-raised-button
    color="primary"  (click)="onUpdate()">Update</button>  
</mat-dialog-actions>
</div>
