<mat-toolbar mat-dialog-title *ngIf="addOnlyForm" style="background-color:peru;">  
    Add Course-Module   
</mat-toolbar> 


<mat-dialog-content>
<ng-container>
       
    <form [formGroup]="moduleForm" >
        <div >
          <mat-form-field style="width: 100%;">
            <mat-label>Select Course </mat-label>
            <mat-select formControlName="course" required>
              <mat-option *ngFor="let course of courseList" [value]="course.course_name">
                {{course.course_name}}
              </mat-option>
            </mat-select>
            <mat-error>
              {{errors.course_select}}
            </mat-error>
          </mat-form-field>
          
          </div>
      <div >
        <mat-form-field class="email-full-width">
          <mat-label>Module Name</mat-label>
          <input type="module_name" id="module_name"  name="module_name" matInput placeholder="Ex. DBC" formControlName="module_name" required>
      </mat-form-field>
      </div>
   
      <div>
      <mat-form-field class="email-full-width">
        <mat-label>Module Code</mat-label>
        <input type="module_code" id="module_code"  name="module_code" matInput placeholder="Ex. ice@example.com" formControlName="module_code" required>
    </mat-form-field>
  </div>

  <div>
    <mat-form-field class="email-full-width">
      <mat-label>Lecturer </mat-label>
      <input type="lecturer" id="lecturer"  name="lecturer" matInput placeholder="lecturer" formControlName="lecturer" required>
  </mat-form-field>
</div>
    </form>
    <div>

    </div>
  

  </ng-container>
</mat-dialog-content>
<div class="dialog-actions">
  <mat-dialog-actions >  
    <button  mat-raised-button 
    color="warn"  (click)="close()">Close</button>  &nbsp;&nbsp;
    <button  mat-raised-button
    color="primary"  >Add</button>  
</mat-dialog-actions>
</div>
