<mat-toolbar mat-dialog-title *ngIf="addOnlyForm" style="background-color:peru;">  
    Add Course   
</mat-toolbar> 

<mat-toolbar mat-dialog-title *ngIf="!addOnlyForm" style="background-color:peru;">  
  Update Course Details  
</mat-toolbar>

<mat-dialog-content>
<ng-container>
       
    <form [formGroup]="courseForm" >
      <div >
 
        <mat-form-field class="email-full-width">
          <mat-label>Course Name</mat-label>
          <input type="course_name" id="course_name"  name="course_name" matInput placeholder="Ex. DBC" formControlName="course_name" required>
      </mat-form-field>
      </div>
   
      <div>
      <mat-form-field class="email-full-width">
        <mat-label>Course Code</mat-label>
        <input type="course_code" id="course_code"  name="course_code" matInput placeholder="Ex. ice@example.com" formControlName="course_code" required>
    </mat-form-field>
  </div>
  <div>
    <mat-form-field class="email-full-width">
      <mat-label>Level </mat-label>
      <input type="level" id="level"  name="level" matInput placeholder="level" formControlName="level" required>
  </mat-form-field>
</div>
<div>
  <mat-form-field class="email-full-width">
    <mat-label>Start Date</mat-label>
    <input type="start_date" id="start_date"  name="start_date" matInput placeholder="Ex. 12er33i" formControlName="start_date" required>
</mat-form-field>
</div>
<div>
<mat-form-field class="email-full-width">
  <mat-label>End Date</mat-label>
  <input type="end_date" id="end_date"  name="end_date" matInput placeholder="Ex. course" formControlName="end_date" required>
</mat-form-field>
</div>
<div>
<mat-form-field class="email-full-width">
  <mat-label>Certificate Issue Date</mat-label>
  <input type="certificate_issuedate" id="certificate_issuedate"  name="certificate_issuedate" matInput placeholder="certificate_issuedate" formControlName="certificate_issuedate" required>
</mat-form-field>
</div>

    </form>
    <div>

    </div>
  

  </ng-container>
</mat-dialog-content>
<div class="dialog-actions">
  <mat-dialog-actions >  
    <button  mat-raised-button 
    color="warn"  (click)="close()">Close</button>  &nbsp;&nbsp;
    <button  *ngIf="addOnlyForm" mat-raised-button
    color="primary"  >Add</button>  
    <button  *ngIf="!addOnlyForm"  mat-raised-button
    color="primary"  >Update</button>  
</mat-dialog-actions>
</div>
