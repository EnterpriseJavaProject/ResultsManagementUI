<mat-toolbar mat-dialog-title *ngIf="addOnlyForm" style="background-color:peru;">  
    Add Course   
</mat-toolbar> 

<mat-toolbar mat-dialog-title *ngIf="!addOnlyForm" style="background-color:peru;">  
  Update Course Details  
</mat-toolbar>

<mat-dialog-content>
<ng-container>
       
    <form [formGroup]="courseForm" >
      <div >
 
        <mat-form-field class="email-full-width">
          <mat-label>Course Name</mat-label>
          <input  id="course_name"  name="course_name" matInput placeholder="Ex. DBC" formControlName="course_name" required>
          <mat-error>
            {{errors.course_name}}
          </mat-error>
        </mat-form-field>
      </div>
   
      <div>
      <mat-form-field class="email-full-width">
        <mat-label>Course Code</mat-label>
        <input id="course_code"  name="code" matInput placeholder="Ex. DBC100" formControlName="code" required>
        <mat-error>
          {{errors.course_code}}
        </mat-error>
      </mat-form-field>
  </div>
  <div>
    <mat-form-field class="email-full-width">
      <mat-label>Level </mat-label>
      <input id="course_level" type="number" name="course_level" matInput placeholder="Ex. Level 1" formControlName="course_level" required>
      <mat-error>
        {{errors.course_level}}
      </mat-error>
    </mat-form-field>
</div>
<div>
  <mat-form-field class="email-full-width">
    <mat-label>Start Date</mat-label>
    <input matInput [matDatepicker]="picker"formControlName="course_start_date" id="course_start_date" [min]="minDate"  >
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker ></mat-datepicker>
    <mat-error>
      {{errors.start_date}}
    </mat-error>
  </mat-form-field>
</div>
<div>
<mat-form-field class="email-full-width">
  <mat-label>End Date</mat-label>
  <input matInput [matDatepicker]="picker1"formControlName="course_end_date" id="course_end_date" [min]="picker"  >
  <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
  <mat-datepicker #picker1 ></mat-datepicker>  
  <mat-error>
    {{errors.end_date}}
  </mat-error>
</mat-form-field>
</div>
<div>
<mat-form-field class="email-full-width">
  <mat-label>Certificate Issue Date</mat-label>
  <input matInput [matDatepicker]="picker2"formControlName="certificate_issuedate" id="certificate_issuedate" [max]="minDate"  >
  <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
  <mat-datepicker #picker2 ></mat-datepicker>  
  <mat-error>
    {{errors.issue_date}}
  </mat-error>
</mat-form-field>
</div>

    </form>
    <div>

    </div>
  

  </ng-container>
</mat-dialog-content>
<div class="dialog-actions">
  <mat-dialog-actions >  
    <button  mat-raised-button 
    color="warn"  (click)="close()">Close</button>  &nbsp;&nbsp;
    <button  *ngIf="addOnlyForm" mat-raised-button
    color="primary"  >Add</button>  
    <button  *ngIf="!addOnlyForm"  mat-raised-button
    color="primary"  >Update</button>  
</mat-dialog-actions>
</div>
